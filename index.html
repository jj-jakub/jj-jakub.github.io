<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>app-ads.txt</title>
  <meta name="description" content="Hosts app-ads.txt per the IAB Tech Lab specification.">
  <style>
    :root { --bg: #0f1115; --fg: #e8eaed; --accent: #4f8cff; }
    @media (prefers-color-scheme: light) { :root { --bg: #f6f7f9; --fg: #1a1d24; --accent: #2f6bff; } }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: var(--bg); color: var(--fg); padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6; -webkit-font-smoothing: antialiased;
    }
    p { margin: 0; max-width: 60ch; font-size: 17px; text-align: center; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <p>This site hosts <a href="/app-ads.txt">app-ads.txt</a> per the IAB Tech Lab specification, authorizing Google AdMob to sell ad inventory across all apps listed above.</p>
</body>
</html>
